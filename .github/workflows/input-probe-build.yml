name: Input probe build

on:
  workflow_dispatch:
  push:
    paths:
      - "android/input-probe/**"
      - ".github/workflows/input-probe-build.yml"
  pull_request:
    paths:
      - "android/input-probe/**"
      - ".github/workflows/input-probe-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Build debug APK
        working-directory: android/input-probe
        run: gradle :app:assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: input-probe-debug
          path: android/input-probe/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
