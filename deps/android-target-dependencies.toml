format_version = 1
status = "research-baseline"
source_commit = "85e98c11b8eb9c6cdbd46df509f99f6100056166"
source_note = "Inspected through the facsimiles/inkscape mirror; verify the same SHA exists in official GitLab before validation."

# Packages that must already exist in the Android target sysroot before Inkscape CMake configure.
# Inkscape's fallback ExternalProject builds for glibmm/gtkmm are not cross-compilation safe.
[required_pkg_config]
packages = [
  "gtk4 >= 4.14.0",
  "gtkmm-4.0 >= 4.13.3",
  "glibmm-2.68 >= 2.78.1",
  "giomm-2.68",
  "cairomm-1.16",
  "pangomm-2.48",
  "gdk-pixbuf-2.0",
  "graphene-1.0",
  "harfbuzz >= 2.6.5",
  "pangocairo >= 1.44",
  "pangoft2",
  "fontconfig",
  "gmodule-2.0",
  "bdw-gc",
  "lcms2",
  "icu-uc",
]

[required_cmake_or_find_modules]
packages = [
  "GSL",
  "double-conversion",
  "Iconv",
  "Intl",
  "JPEG (optional display support)",
  "PNG",
  "Potrace",
  "Boost headers and stacktrace strategy",
  "LibXml2",
  "LibXslt",
  "ZLIB",
]

[recommended_internal]
packages = [
  "2Geom",
  "Uemf",
  "Depixelize",
  "Autotrace",
  "Adaptagrams",
]
notes = "Internal copies reduce target package count, but each must be checked for Android-specific build assumptions."

[disabled_for_mvp]
cmake_options = [
  "WITH_POPPLER=OFF",
  "WITH_CAPYPDF=OFF",
  "WITH_IMAGE_MAGICK=OFF",
  "WITH_GRAPHICS_MAGICK=OFF",
  "WITH_LIBCDR=OFF",
  "WITH_LIBVISIO=OFF",
  "WITH_LIBWPG=OFF",
  "WITH_LIBSPELLING=OFF",
  "WITH_GSOURCEVIEW=OFF",
  "WITH_GNU_READLINE=OFF",
  "WITH_NLS=OFF",
  "BUILD_TESTING=OFF",
]

[host_tools]
packages = [
  "cmake >= 3.24",
  "meson >= 1.9 for android_exe_type application host",
  "ninja",
  "pkg-config",
  "python3",
  "glib-compile-resources",
  "glib-compile-schemas",
  "glslc",
  "mm-common host generators when building C++ bindings from Git",
]

[hard_invariants]
items = [
  "No target compile or link flag may reference /opt/homebrew, /usr/local/Cellar, or macOS frameworks.",
  "gtkmm and glibmm must be found before Inkscape configure; do not permit the native ExternalProject fallback.",
  "All C++ target libraries must use the same NDK libc++_shared runtime.",
  "The sysroot must be relocatable and contain no CI workspace absolute paths.",
  "Only arm64-v8a is supported through D1.",
]
